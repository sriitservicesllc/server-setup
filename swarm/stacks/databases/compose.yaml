version: "3.8"

services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "PgAdmin@Prod!"
      POSTGRES_DB: app
    volumes:
      - /srv/swarm/postgresql:/var/lib/postgresql/data
    networks:
      - platform_net
    deploy:
      replicas: 1

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: "MySQL@Root1!"
    volumes:
      - /srv/swarm/mysql:/var/lib/mysql
    networks:
      - platform_net
    deploy:
      replicas: 1

  redis:
    image: redis:7.2
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /srv/swarm/redis:/data
    networks:
      - platform_net
    deploy:
      replicas: 1

networks:
  platform_net:
    external: true
