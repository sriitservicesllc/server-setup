---
# =============================================================================
# Role: swarm_common - OS-level baseline configuration for Swarm nodes
# =============================================================================

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true

- name: Install required system packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - jq
      - vim
      - htop
      - net-tools
      - nfs-common
      - ufw
      - chrony
    state: present

- name: Enable and start chrony (NTP)
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap permanently (remove from fstab)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kernel_modules }}"

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/swarm.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Apply sysctl settings for Docker networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-swarm.conf
  loop: "{{ sysctl_settings | dict2items }}"

- name: Set open file limits for Swarm workloads
  ansible.builtin.blockinfile:
    path: /etc/security/limits.conf
    block: |
      * soft nofile 65536
      * hard nofile 65536
      * soft nproc  65536
      * hard nproc  65536
    marker: "# {mark} ANSIBLE SWARM LIMITS"
