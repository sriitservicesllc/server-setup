---
# =============================================================================
# Role: wiki_js — Wiki.js team documentation platform
# Markdown-based wiki with Git storage backend pointing to Gitea
# =============================================================================

- name: Create collaboration namespace
  ansible.builtin.command: kubectl create namespace {{ wiki_js_namespace }}
  ignore_errors: true
  changed_when: true

- name: Add Required Helm repos for Wiki.js
  kubernetes.core.helm_repository:
    name: requarks
    repo_url: https://charts.js.wiki/

- name: Deploy Wiki.js via Helm
  kubernetes.core.helm:
    name: wiki
    chart_ref: requarks/wiki
    chart_version: "{{ wiki_js_version }}"
    release_namespace: "{{ wiki_js_namespace }}"
    create_namespace: false
    wait: true
    wait_timeout: "10m"
    values:
      image:
        repository: ghcr.io/requarks/wiki
        tag: 2
      postgresql:
        enabled: true
        auth:
          username: wiki
          password: "{{ keycloak_admin_password }}"
          database: wiki
        primary:
          persistence:
            storageClass: "{{ wiki_js_storage_class }}"
            size: "{{ wiki_js_storage_size }}"
      ingress:
        enabled: true
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "50m"
        hosts:
          - host: "{{ wiki_js_hostname }}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: wiki-tls
            hosts:
              - "{{ wiki_js_hostname }}"
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 1Gi
          cpu: 500m
      config:
        db:
          type: postgres
        bindIP: "0.0.0.0"
        port: 3000
        siteUrl: "https://{{ wiki_js_hostname }}"

- name: Wait for Wiki.js to be ready
  ansible.builtin.shell: >
    kubectl get pods -n {{ wiki_js_namespace }} -l app.kubernetes.io/name=wiki
    --no-headers | grep -v Running | grep -v Completed | wc -l
  register: wiki_pods
  until: wiki_pods.stdout | int == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Display Wiki.js access info
  ansible.builtin.debug:
    msg:
      - "Wiki.js:  https://{{ wiki_js_hostname }}"
      - "Complete setup wizard on first visit"
      - ""
      - "RECOMMENDED CONFIGURATION:"
      - "  - Storage: Git (point to {{ gitea_hostname }}/team/wiki-content.git)"
      - "  - Authentication: Add OIDC with Keycloak"
      - "    OIDC endpoint: https://{{ keycloak_hostname }}/realms/{{ keycloak_realm }}"
