---
# =============================================================================
# Role: control_plane — Initialize the Kubernetes control plane with kubeadm
# =============================================================================

- name: Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_check

- name: Create kubeadm init config file
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
    mode: "0600"
  when: not kubeadm_init_check.stat.exists

- name: Initialize Kubernetes control plane
  ansible.builtin.command: >
    kubeadm init
    --config /tmp/kubeadm-config.yaml
    --upload-certs
    --ignore-preflight-errors=NumCPU
  register: kubeadm_init_output
  when: not kubeadm_init_check.stat.exists
  changed_when: true

- name: Store kubeadm init output for join token extraction
  ansible.builtin.set_fact:
    kubeadm_init_stdout: "{{ kubeadm_init_output.stdout }}"
  when: not kubeadm_init_check.stat.exists

# ── kubectl config for root ─────────────────────────────────────────────────
- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy admin.conf to root's .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"

# ── kubectl config for ansible_user ────────────────────────────────────────
- name: Create .kube directory for {{ ansible_user }}
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Copy admin.conf to {{ ansible_user }}'s .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

# ── Fetch kubeconfig to local machine ──────────────────────────────────────
- name: Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/kubeconfig/admin.conf"
    flat: true
  run_once: true

# ── Generate worker join command ────────────────────────────────────────────
- name: Generate worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false
  run_once: true

- name: Store join command as fact accessible by workers
  ansible.builtin.set_fact:
    worker_join_command: "{{ kubeadm_join_command.stdout }}"
  run_once: true

- name: Save join command to file on master (workers will read it)
  ansible.builtin.copy:
    content: "{{ kubeadm_join_command.stdout }}"
    dest: /tmp/k8s_worker_join_command.sh
    mode: "0700"
  run_once: true

# ── Wait for API server to be ready ────────────────────────────────────────
- name: Wait for API server to be responsive
  ansible.builtin.uri:
    url: "https://{{ k8s_api_server_ip }}:6443/healthz"
    validate_certs: false
    status_code: 200
  register: api_health
  until: api_health.status == 200
  retries: 30
  delay: 10

- name: Wait for all control-plane pods to be Running
  ansible.builtin.shell: >
    kubectl get pods -n kube-system --no-headers
    | grep -v Running | grep -v Completed | grep -v coredns | wc -l
  register: pending_pods
  until: pending_pods.stdout | int == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Ensure monitoring namespace exists
  ansible.builtin.shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
  changed_when: true

- name: Install Prometheus Operator CRDs (ServiceMonitors & PodMonitors)
  ansible.builtin.command: >
    kubectl apply --server-side --force-conflicts -f
    https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/{{ item }}
  loop:
    - monitoring.coreos.com_servicemonitors.yaml
    - monitoring.coreos.com_podmonitors.yaml
    - monitoring.coreos.com_prometheusrules.yaml
  changed_when: true
