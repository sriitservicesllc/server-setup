---
# =============================================================================
# Role: kubernetes_binaries — Install kubeadm, kubelet, kubectl
# =============================================================================

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Kubernetes apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key"
    dest: /tmp/k8s-release.key
    mode: "0644"

- name: Dearmor and store Kubernetes GPG key
  ansible.builtin.shell: >
    gpg --dearmor < /tmp/k8s-release.key
    > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg]
      https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /
    state: present
    filename: kubernetes

- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - "kubeadm={{ kubernetes_version_full }}"
      - "kubelet={{ kubernetes_version_full }}"
      - "kubectl={{ kubernetes_version_full }}"
    state: present
    update_cache: true

- name: Hold Kubernetes packages at current version (prevent auto-upgrade)
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl

- name: Enable and start kubelet service
  ansible.builtin.service:
    name: kubelet
    state: started
    enabled: true

- name: Install Helm package manager
  block:
    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: "0755"

    - name: Execute Helm install script
      ansible.builtin.command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Verify Helm installation
      ansible.builtin.command: helm version --short
      register: helm_version
      changed_when: false

    - name: Display Helm version
      ansible.builtin.debug:
        msg: "Helm installed: {{ helm_version.stdout }}"

- name: Add popular Helm repositories
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
  loop:
    - { name: stable,         url: "https://charts.helm.sh/stable" }
    - { name: bitnami,        url: "https://charts.bitnami.com/bitnami" }
    - { name: ingress-nginx,  url: "https://kubernetes.github.io/ingress-nginx" }
    - { name: cert-manager,   url: "https://charts.jetstack.io" }
    - { name: metallb,        url: "https://metallb.github.io/metallb" }
    - { name: longhorn,       url: "https://charts.longhorn.io" }
    - { name: harbor,         url: "https://helm.goharbor.io" }
    - { name: aqua,           url: "https://aquasecurity.github.io/helm-charts/" }
    - { name: prometheus,     url: "https://prometheus-community.github.io/helm-charts" }
    - { name: grafana,        url: "https://grafana.github.io/helm-charts" }
    - { name: elastic,        url: "https://helm.elastic.co" }
    - { name: vmware-tanzu,   url: "https://vmware-tanzu.github.io/helm-charts" }
    # ── New DevOps / Collaboration Tools ──────────────────────────────────
    - { name: gitea-charts,   url: "https://dl.gitea.io/charts/" }
    - { name: woodpecker,     url: "https://woodpecker-ci.org/" }
    - { name: argo,           url: "https://argoproj.github.io/argo-helm" }
    - { name: sonarqube,      url: "https://SonarSource.github.io/helm-chart-sonarqube" }
    - { name: openbao,        url: "https://openbao.github.io/openbao-helm" }
    - { name: mattermost,     url: "https://helm.mattermost.com" }
    - { name: requarks,       url: "https://charts.js.wiki/" }
    - { name: kong,           url: "https://charts.konghq.com" }
  when: node_role == "master"
  run_once: true
