---
# =============================================================================
# Role: swarm_cd - Bootstrap SwarmCD for Git-driven stack updates
# =============================================================================

- name: Create SwarmCD directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ swarm_cd_root }}"
    - "{{ swarm_cd_root }}/config"

- name: Render SwarmCD repository configuration
  ansible.builtin.template:
    src: repos.yaml.j2
    dest: "{{ swarm_cd_root }}/config/repos.yaml"
    mode: "0644"

- name: Render SwarmCD stack configuration
  ansible.builtin.template:
    src: stacks.yaml.j2
    dest: "{{ swarm_cd_root }}/config/stacks.yaml"
    mode: "0644"

- name: Render SwarmCD stack file
  ansible.builtin.template:
    src: swarm-cd-stack.yml.j2
    dest: "{{ swarm_cd_root }}/swarm-cd-stack.yml"
    mode: "0644"

- name: Deploy SwarmCD stack
  ansible.builtin.command: >-
    docker stack deploy
    --compose-file {{ swarm_cd_root }}/swarm-cd-stack.yml
    {{ 'swarm-cd' }}
  changed_when: true

- name: Show SwarmCD bootstrap info
  ansible.builtin.debug:
    msg:
      - "SwarmCD: https://{{ swarm_cd_hostname }}"
      - "Repo:    {{ swarm_cd_repo_url }}"
      - "Stacks:  {{ swarm_profile_stacks | map(attribute='compose_file') | list }}"
