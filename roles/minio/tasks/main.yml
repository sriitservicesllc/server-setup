---
# =============================================================================
# Role: minio — Deploy MinIO as in-cluster S3-compatible object storage
# Used as the Velero backup target, keeping all backup data on-premises
# =============================================================================

- name: Create MinIO namespace
  ansible.builtin.command: kubectl create namespace {{ minio_namespace }}
  ignore_errors: true
  changed_when: true

- name: Create MinIO admin credentials secret
  ansible.builtin.shell: >
    kubectl create secret generic minio-credentials
    --from-literal=root-user={{ minio_root_user }}
    --from-literal=root-password={{ minio_root_password }}
    -n {{ minio_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  changed_when: true

- name: Add official MinIO Helm repository
  kubernetes.core.helm_repository:
    name: minio
    repo_url: "https://charts.min.io/"

- name: Install MinIO via Official Helm Chart
  kubernetes.core.helm:
    name: minio
    chart_ref: minio/minio
    chart_version: "{{ minio_version }}"
    release_namespace: "{{ minio_namespace }}"
    create_namespace: false
    wait: true
    wait_timeout: "10m"
    values:
      # Use secure, zero-CVE community image
      image:
        repository: cgr.dev/chainguard/minio
        tag: latest
        pullPolicy: IfNotPresent

      mode: standalone

      # Root Authorization Mapping
      rootUser: "{{ minio_root_user }}"
      rootPassword: "{{ minio_root_password }}"

      # Disable the built-in Console sub-route if you only manage it via Ingress
      consoleService:
        enabled: false

      # Storage & Persistence Configuration
      persistence:
        enabled: true
        storageClass: "{{ minio_storage_class }}"
        size: "{{ minio_storage_size }}"

      # Compute Allocation Boundaries
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 2Gi
          cpu: 1000m

      # S3 API Network Configuration
      service:
        type: ClusterIP
        port: 9000

      # Main API Route Exposure
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - "{{ minio_hostname }}"
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        tls:
          - hosts:
              - "{{ minio_hostname }}"

      # Independent Console UI Route Exposure
      consoleIngress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - "{{ minio_console_hostname }}"
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
        tls:
          - hosts:
              - "{{ minio_console_hostname }}"

      # Prometheus Monitoring Configuration
      metrics:
        serviceMonitor:
          enabled: true
          namespace: monitoring

      # Automatic Bucket & Resource Lifecycle Provisioning
      buckets: "{{ minio_buckets }}"
      policies: []

- name: Wait for MinIO to be ready
  ansible.builtin.shell: >
    kubectl get pods -n {{ minio_namespace }} --no-headers | grep -v Running | grep -v Completed | wc -l
  register: minio_pods
  until: minio_pods.stdout | int == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Verify MinIO API is reachable
  ansible.builtin.uri:
    url: "http://minio.{{ minio_namespace }}.svc.cluster.local:9000/minio/health/live"
    return_content: false
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 15
  delay: 10
  ignore_errors: true

- name: Display MinIO access info
  ansible.builtin.debug:
    msg:
      - "MinIO API: https://{{ minio_hostname }}"
      - "MinIO Console: https://{{ minio_console_hostname }}"
      - "Access Key: {{ minio_root_user }}"
      - "Velero bucket: velero-backups (auto-created)"
