---
# =============================================================================
# Role: mattermost — Team chat with Gitea/ArgoCD integrations
# =============================================================================

- name: Add Mattermost Helm repository
  kubernetes.core.helm_repository:
    name: mattermost
    repo_url: https://helm.mattermost.com

- name: Install Mattermost via Helm
  kubernetes.core.helm:
    name: mattermost
    chart_ref: mattermost/mattermost-team-edition
    chart_version: "6.6.53"
    release_namespace: "{{ mattermost_namespace }}"
    create_namespace: false
    wait: true
    wait_timeout: "10m"
    values:
      image:
        repository: mattermost/mattermost-team-edition
        tag: release-9.10
      persistence:
        data:
          enabled: true
          storageClass: "{{ mattermost_storage_class }}"
          size: "{{ mattermost_storage_size }}"
        plugins:
          enabled: true
          storageClass: "{{ mattermost_storage_class }}"
          size: 2Gi
      mysql:
        enabled: false
      externalDB:
        enabled: true
        externalDriverType: postgres
        externalConnectionString: >-
          postgres://mattermost:{{ mattermost_admin_password }}@postgresql.databases.svc.{{ cluster_domain }}:5432/mattermost?sslmode=disable
      ingress:
        enabled: true
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "50m"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
        hosts:
          - host: "{{ mattermost_hostname }}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: mattermost-tls
            hosts:
              - "{{ mattermost_hostname }}"
      resources:
        requests:
          memory: 256Mi
          cpu: 250m
        limits:
          memory: 1Gi
          cpu: 1000m
      config:
        SiteURL: "https://{{ mattermost_hostname }}"
        SiteName: "{{ mattermost_site_name }}"
        EnableOpenServer: false

- name: Create Mattermost database in PostgreSQL
  ansible.builtin.shell: >
    kubectl exec -n databases postgresql-0
    -- psql -U postgres -c "CREATE DATABASE mattermost OWNER postgres;"
  changed_when: true
  ignore_errors: true

- name: Wait for Mattermost to be ready
  ansible.builtin.shell: >
    kubectl get pods -n {{ mattermost_namespace }} -l app.kubernetes.io/name=mattermost-team-edition
    --no-headers | grep -v Running | grep -v Completed | wc -l
  register: mm_pods
  until: mm_pods.stdout | int == 0
  retries: 30
  delay: 15
  changed_when: false

- name: Display Mattermost access info
  ansible.builtin.debug:
    msg:
      - "Mattermost Chat: https://{{ mattermost_hostname }}"
      - "Complete team setup on first visit"
      - ""
      - "RECOMMENDED INTEGRATIONS (via Mattermost Marketplace):"
      - "  - Gitea Webhook → Post commits/PRs to channels"
      - "  - ArgoCD Bot → Deploy notifications"
      - "  - Grafana Alerts → Send alerts to #alerts channel"
      - "  - Jira/Plane Bot → Project task notifications"
      - ""
      - "KEYCLOAK SSO: Admin → System Console → Authentication → OAuth 2.0"
      - "  Gitlab (compatible) endpoint: https://{{ keycloak_hostname }}/realms/{{ keycloak_realm }}"
