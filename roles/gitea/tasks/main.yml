---
# =============================================================================
# Role: gitea - Self-hosted Git service with email-based authentication
# Deploys the official Gitea container directly, without the Helm chart
# =============================================================================

- name: Create devops namespace
  ansible.builtin.command: kubectl create namespace {{ gitea_namespace }}
  ignore_errors: true
  changed_when: true

- name: Create Gitea database user in PostgreSQL
  ansible.builtin.shell: |
    kubectl exec -n databases postgresql-0 -c postgresql -- bash -lc '
      PGPASSWORD="{{ postgresql_password }}" psql -U postgres -d postgres -v ON_ERROR_STOP=1 <<SQL
    DO \$\$
    BEGIN
      IF NOT EXISTS (
        SELECT FROM pg_catalog.pg_roles WHERE rolname = '\''gitea'\''
      ) THEN
        CREATE USER gitea WITH ENCRYPTED PASSWORD '\''{{ gitea_db_password }}'\'';
      END IF;
    END
    \$\$;
    SQL
    '
  changed_when: false

- name: Create Gitea database in PostgreSQL
  ansible.builtin.shell: |
    kubectl exec -n databases postgresql-0 -c postgresql -- bash -lc '
      PGPASSWORD="{{ postgresql_password }}" psql -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='\''gitea'\''" | grep -q 1 ||
      PGPASSWORD="{{ postgresql_password }}" psql -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE gitea OWNER gitea;"
    '
  changed_when: false

- name: Uninstall existing Gitea Helm release if present
  ansible.builtin.command: helm uninstall gitea -n {{ gitea_namespace }}
  register: gitea_helm_uninstall
  failed_when: false
  changed_when: "'uninstalled' in gitea_helm_uninstall.stdout | lower"

- name: Render Gitea secret
  ansible.builtin.template:
    src: gitea-secret.yaml.j2
    dest: /tmp/gitea-secret.yaml
    mode: "0644"

- name: Render Gitea PVC
  ansible.builtin.template:
    src: gitea-pvc.yaml.j2
    dest: /tmp/gitea-pvc.yaml
    mode: "0644"

- name: Render Gitea Deployment
  ansible.builtin.template:
    src: gitea-deployment.yaml.j2
    dest: /tmp/gitea-deployment.yaml
    mode: "0644"

- name: Render Gitea Services
  ansible.builtin.template:
    src: gitea-service.yaml.j2
    dest: /tmp/gitea-service.yaml
    mode: "0644"

- name: Render Gitea Ingress
  ansible.builtin.template:
    src: gitea-ingress.yaml.j2
    dest: /tmp/gitea-ingress.yaml
    mode: "0644"

- name: Apply Gitea base resources
  ansible.builtin.command: >
    kubectl apply
    -f /tmp/gitea-secret.yaml
    -f /tmp/gitea-pvc.yaml
    -f /tmp/gitea-service.yaml
    -f /tmp/gitea-deployment.yaml
    -f /tmp/gitea-ingress.yaml
  changed_when: true

- name: Wait for Gitea deployment to be ready
  ansible.builtin.command: kubectl rollout status -n {{ gitea_namespace }} deployment/gitea --timeout=15m
  register: gitea_rollout
  changed_when: false

- name: Ensure Gitea admin user exists
  ansible.builtin.shell: >
    kubectl exec -n {{ gitea_namespace }} deployment/gitea -- sh -lc '
      if gitea admin user list 2>/dev/null | grep -Fq "{{ gitea_admin_user }}"; then
        echo "admin user exists";
      else
        gitea admin user create --username "{{ gitea_admin_user }}" --password "{{ gitea_admin_password }}" --email "{{ gitea_admin_email }}" --admin --must-change-password=false;
      fi
    '
  register: gitea_admin_bootstrap
  changed_when: "'created' in gitea_admin_bootstrap.stdout | lower"

- name: Get Gitea SSH LoadBalancer IP
  ansible.builtin.shell: >
    kubectl get svc -n {{ gitea_namespace }} gitea-ssh
    -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
  register: gitea_ssh_ip
  changed_when: false
  ignore_errors: true

- name: Display Gitea access info
  ansible.builtin.debug:
    msg:
      - "======================================================="
      - " Gitea Git Service"
      - "======================================================="
      - " Web UI:    https://{{ gitea_hostname }}"
      - " SSH clone: git@{{ gitea_ssh_ip.stdout | default('SSH_LB_IP') }}:22"
      - " Admin:     {{ gitea_admin_user }} / {{ gitea_admin_password }}"
      - "-------------------------------------------------------"
      - " Auth mode: Email-based (local accounts)"
      - " Registration: {{ 'OPEN' if gitea_allow_registration else 'ADMIN ONLY' }}"
      - " Email confirm: {{ 'YES (SMTP configured)' if gitea_smtp_enabled else 'NO (disabled)' }}"
      - "-------------------------------------------------------"
      - " NEXT: Create an OAuth2 app for Woodpecker CI:"
      - "   Gitea Admin -> Site Admin -> Applications"
      - "   Name: Woodpecker CI"
      - "   Redirect: https://{{ woodpecker_hostname }}/authorize"
      - "   -> Copy Client ID + Secret -> set in vault.yml"
      - "======================================================="
