---
# =============================================================================
# Docker Swarm Platform Variables
# =============================================================================

swarm_stack_root: /opt/swarm-platform
swarm_stack_render_root: "{{ swarm_stack_root }}/rendered"
swarm_cd_root: /opt/swarm-cd
swarm_overlay_network: platform_net

# SwarmCD bootstrapping
swarm_cd_enabled: true
swarm_cd_image: "ghcr.io/m-adawi/swarm-cd:v1.11.0"
swarm_cd_hostname: "swarm-cd.sriitservices.local"
swarm_cd_repo_url: "https://git.sriitservices.local/platform/server-setup.git"
swarm_cd_repo_branch: "main"

# Swarm persistence
swarm_data_root: /srv/swarm
swarm_storage_mode: "host-path"

# This profile uses the same service hostnames defined in inventory/group_vars/all.yml.
# Longhorn is Kubernetes-only, so the Swarm profile uses bind mounts or NFS-backed
# paths under /srv/swarm instead of Longhorn StorageClasses.
swarm_longhorn_note: "Longhorn is not deployed in Swarm; use host-path/NFS volumes."

# Optional stack deployment order
swarm_profile_stacks:
  - name: databases
    template: databases-stack.yml.j2
    stack_name: databases
    compose_file: swarm/stacks/databases/compose.yaml
  - name: gitea
    template: gitea-stack.yml.j2
    stack_name: gitea
    compose_file: swarm/stacks/gitea/compose.yaml
  - name: kong
    template: kong-stack.yml.j2
    stack_name: kong
    compose_file: swarm/stacks/kong/compose.yaml
  - name: logging
    template: logging-stack.yml.j2
    stack_name: logging
    compose_file: swarm/stacks/logging/compose.yaml
  - name: monitoring
    template: monitoring-stack.yml.j2
    stack_name: monitoring
    compose_file: swarm/stacks/monitoring/compose.yaml
  - name: trivy
    template: trivy-stack.yml.j2
    stack_name: trivy
    compose_file: swarm/stacks/trivy/compose.yaml
