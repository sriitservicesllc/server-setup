---
# =============================================================================
# Kubernetes Cluster Inventory
# =============================================================================
# Configure your node IP addresses and SSH settings here.
# Add or remove hosts from the worker group to scale the cluster.

all:
  vars:
    # ── SSH Connection ──────────────────────────────────────────────────────
    ansible_user: ansible                  # SSH user on all nodes
    ansible_ssh_private_key_file: ~/.ssh/k8s_cluster_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3

  children:
    # ── Control Plane ───────────────────────────────────────────────────────
    k8s_masters:
      hosts:
        master-01:
          ansible_host: 192.168.1.100
          node_role: master

    # ── Worker Nodes ────────────────────────────────────────────────────────
    # Add / remove worker entries here to scale the cluster.
    k8s_workers:
      hosts:
        worker-01:
          ansible_host: 192.168.1.101
          node_role: worker
          node_labels:
            workload: general
        worker-02:
          ansible_host: 192.168.1.102
          node_role: worker
          node_labels:
            workload: general
        worker-03:
          ansible_host: 192.168.1.103
          node_role: worker
          node_labels:
            workload: general
        worker-04:
          ansible_host: 192.168.1.104
          node_role: worker
          node_labels:
            workload: storage   # dedicated storage node

    # ── Convenience grouping (all k8s nodes) ────────────────────────────────
    k8s_cluster:
      children:
        k8s_masters: {}
        k8s_workers: {}
